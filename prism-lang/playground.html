<script>
const PYODIDE_VERSION = "v0.26.4";
const CDN_BASE = `https://cdn.jsdelivr.net/pyodide/${PYODIDE_VERSION}/full/`;
const EXAMPLES = {
  "divide (effect + failure)":
`divide(a: Num, b: Num) : Num ?DivByZero  <-
  b match
    0  =>  fail DivByZero
    _  =>  ok (a / b)

main : () !console  <-
  attempt
    show!console "10 / 2 = {try divide(10, 2)}"
    show!console "10 / 0 = {try divide(10, 0)}"
  rescue
    DivByZero  =>  show!console "10 / 0 = undefined"`,

  "or-type + exhaustive match":
`Shape : Circle{ radius: Num }  or  Square{ side: Num }

area(s: Shape) : Num  <-
  s match
    Circle{radius}  =>  radius * radius * 3
    Square{side}    =>  side * side

main : () !console  <-
  show!console "circle r=2 -> {area(Circle{radius: 2})}"
  show!console "square s=3 -> {area(Square{side: 3})}"`,

  "capabilities + dispatch":
`capability Show for T
  render(x: T) : Text

Num  provides Show
  render(x)  <-  "a number"
Text provides Show
  render(x)  <-  x

describe for T given T: Show (x: T) : Text  <-  render(x)

main : () !console  <-

  show!console describe("hello")`,

  "★ Sierpinski (press Draw)":
`-- press "Draw": \`picture\` is a pure list of line segments the canvas renders.
-- A Sierpinski triangle by midpoint recursion -- pure arithmetic, no trigonometry.

mid(a, b)  <-  (a + b) / 2

sierpinski(depth, ax, ay, bx, by, cx, cy, acc)  <-
  depth match
    0  =>  [ Line{x1: ax, y1: ay, x2: bx, y2: by},
             Line{x1: bx, y1: by, x2: cx, y2: cy},
             Line{x1: cx, y1: cy, x2: ax, y2: ay}, ..acc ]
    _  =>
      abx  <-  mid(ax, bx)
      aby  <-  mid(ay, by)
      bcx  <-  mid(bx, cx)
      bcy  <-  mid(by, cy)
      acx  <-  mid(ax, cx)
      acy  <-  mid(ay, cy)
      sierpinski(depth - 1, ax, ay, abx, aby, acx, acy,
        sierpinski(depth - 1, abx, aby, bx, by, bcx, bcy,
          sierpinski(depth - 1, acx, acy, bcx, bcy, cx, cy, acc)))

picture  <-  sierpinski(5, 0, 0, 512, 0, 256, 443, [])`,

  "★ Koch snowflake (press Draw)":
`-- each segment becomes 4 with an outward 60-degree bump (uses sin/cos/pi).
koch(depth, ax, ay, bx, by, acc)  <-
  depth match
    0  =>  [ Line{x1: ax, y1: ay, x2: bx, y2: by}, ..acc ]
    _  =>
      dx  <-  bx - ax
      dy  <-  by - ay
      cx  <-  ax + dx / 3
      cy  <-  ay + dy / 3
      ex  <-  ax + dx * 2 / 3
      ey  <-  ay + dy * 2 / 3
      vx  <-  ex - cx
      vy  <-  ey - cy
      co  <-  cos(pi / 3)
      si  <-  sin(pi / 3)
      px  <-  cx + (vx * co + vy * si)
      py  <-  cy + (vy * co - vx * si)
      koch(depth - 1, ax, ay, cx, cy,
        koch(depth - 1, cx, cy, px, py,
          koch(depth - 1, px, py, ex, ey,
            koch(depth - 1, ex, ey, bx, by, acc))))

picture  <-
  koch(4, 0, 0, 300, 0,
    koch(4, 300, 0, 150, 260,
      koch(4, 150, 260, 0, 0, [])))`,

  "★ Pythagoras tree (press Draw)":
`-- each square sprouts two smaller squares tilted 45 degrees (uses sin/cos/pi).
pythagoras(depth, x1, y1, x2, y2, acc)  <-
  dx  <-  x2 - x1
  dy  <-  y2 - y1
  x4  <-  x1 - dy
  y4  <-  y1 + dx
  x3  <-  x2 - dy
  y3  <-  y2 + dx
  sq  <-  [ Line{x1: x1, y1: y1, x2: x2, y2: y2},
            Line{x1: x2, y1: y2, x2: x3, y2: y3},
            Line{x1: x3, y1: y3, x2: x4, y2: y4},
            Line{x1: x4, y1: y4, x2: x1, y2: y1}, ..acc ]
  depth match
    0  =>  sq
    _  =>
      c   <-  cos(pi / 4)
      s   <-  sin(pi / 4)
      wx  <-  x3 - x4
      wy  <-  y3 - y4
      tx  <-  x4 + c * (wx * c - wy * s)
      ty  <-  y4 + c * (wx * s + wy * c)
      pythagoras(depth - 1, x4, y4, tx, ty,
        pythagoras(depth - 1, tx, ty, x3, y3, sq))

picture  <-  pythagoras(8, 0, 0, 40, 0, [])`,

  "★ Projectile 2-D physics (press Draw)":
`-- a projectile under gravity, using the included 2-D physics library.
include "lib/physics2d.prism"

trace(n, body)  <-
  n match
    0  =>  []
    _  =>
      p  <-  body.pos
      (p.y < 0) match
        true   =>  []
        false  =>  [ Dot{x: p.x, y: p.y}, ..trace(n - 1, step(body, V{x: 0, y: 0 - 10}, 0.25)) ]

picture  <-  trace(80, B{ pos: V{x: 0, y: 0}, vel: V{x: 20, y: 40} })`,

  "reveal me (no signatures)":
`ask          <-  try parseNum(read!console)
greet(name)  <-  show!console "hi {name}"
add(a, b)    <-  a + b`,

  "a contract that lies (try Check)":
`-- greetAll touches the console but claims to be pure. Hit Check.
greetAll(names: List[Text]) : ()  <-
  map(names, n -> show!console "hi {n}")
  ()

map for T, U, !e, ?g
  (xs: List[T], f: (T) -> U !e ?g) : List[U] !e ?g  <-
    xs match
      []        =>  []
      [h, ..t]  =>  [ try f(h), ..try map(t, f) ]`,
};

const GLUE = `
import io, sys, os
sys.path.insert(0, os.getcwd())
import prism, check

def _cap(fn):
    out, old = io.StringIO(), sys.stdout
    sys.stdout = out
    try: fn()
    finally: sys.stdout = old
    return out.getvalue()

def pz_run(src, stdin_text):
    def go():
        old_in = sys.stdin
        sys.stdin = io.StringIO(stdin_text)
        try:
            try:
                genv = prism.build_env(prism.Parser(prism.lex(src)).parse_program())
                if "main" not in genv.vars:           # no entry point -> guide to the right button
                    if "picture" in genv.vars:
                        print("This program has no 'main' to Run. It defines 'picture', so press Draw.")
                    else:
                        print("This program has no 'main' to Run. Try Check (verify it) or Reveal (show its contracts).")
                    return
                prism.force(genv.get("main"))
            except (SyntaxError, RuntimeError, NameError, TypeError) as e:
                print(f"[prism error] {e}")
        finally:
            sys.stdin = old_in
    return _cap(go)

def _via_file(src, entry):
    with open("_pad.prism", "w", encoding="utf-8") as f:
        f.write(src)
    def go():
        try: entry("_pad.prism")
        except (SyntaxError, RuntimeError) as e: print(f"[parse error] {e}")
    return _cap(go)

def pz_check(src):  return _via_file(src, check.check_file)
def pz_reveal(src): return _via_file(src, check.reveal_file)

import json
def _shapes_json(pic):
    # accept either a bare List[Shape] or a Picture record (which carries its shapes
    # in a 'shapes' field), and lower it to plain JSON the canvas can draw.
    pic = prism.force(pic)
    if isinstance(pic, prism.Tagged) and "shapes" in pic.fields:
        pic = prism.force(pic.fields["shapes"])
    shapes = []
    if isinstance(pic, list):
        for s in pic:
            s = prism.force(s)
            if isinstance(s, prism.Tagged):
                d = {"kind": s.tag}
                for k, v in s.fields.items():
                    v = prism.force(v)
                    if isinstance(v, list):                # e.g. a Poly's list of points
                        d[k] = [{pk: prism.force(pv) for pk, pv in prism.force(e).fields.items()}
                                for e in v if isinstance(prism.force(e), prism.Tagged)]
                    else:
                        d[k] = v
                shapes.append(d)
    return shapes

def pz_picture(src):
    # evaluate the program's \`picture\` value (a pure list of shapes) and hand it
    # to the host as JSON; the canvas does the drawing -- the language stays pure.
    try:
        pic = prism.value_of(src, "picture")
    except Exception as e:
        return json.dumps({"error": str(e)})
    return json.dumps({"shapes": _shapes_json(pic)})

# animation: the program defines a PURE function frame(t) : Picture (its !-free signature
# says the animation has no side effects). The host advances t and asks for each frame.
# The built env is cached per source so we don't re-parse every frame.
_FRAME = {"src": None, "fn": None}
def pz_frame(src, t):
    try:
        if _FRAME["src"] != src or _FRAME["fn"] is None:
            genv = prism.build_env(prism.parse_program_with_includes(src))
            if "frame" not in genv.vars:
                return json.dumps({"error": "no 'frame' defined"})
            _FRAME["src"] = src
            _FRAME["fn"] = prism.force(genv.get("frame"))
        val = prism.apply_fn(_FRAME["fn"], [float(t)])
        return json.dumps({"shapes": _shapes_json(val)})
    except Exception as e:
        return json.dumps({"error": str(e)})
`;

const $ = id => document.getElementById(id);
const statusEl = $("status"), outEl = $("out");
let pyodide = null;

let animId = null;
function stopAnim() { if (animId !== null) { cancelAnimationFrame(animId); animId = null; } }

function setStatus(t, cls) { statusEl.textContent = t; statusEl.className = "sub " + (cls||""); }
function show(text, cls) {
  stopAnim(); stopFrameAnim();
  $("canvas").style.display = "none"; outEl.style.display = "block";
  outEl.textContent = text === "" ? "(no output)" : text;
  outEl.className = cls || "";
}

// Draw the shapes, COLOURED (by an explicit `h` hue field, else a rainbow along draw order)
// and ANIMATED -- revealed a few at a time so the figure draws itself.
function drawShapes(shapes, animate) {
  animate = animate !== false;
  stopAnim(); stopFrameAnim();
  const cv = $("canvas");
  outEl.style.display = "none"; cv.style.display = "block";
  cv.width = cv.clientWidth; cv.height = cv.clientHeight;
  const ctx = cv.getContext("2d");
  ctx.fillStyle = "#0d1016"; ctx.fillRect(0, 0, cv.width, cv.height);
  const n = shapes.length;
  if (!n) return;
  // bounding box over all coordinates (computed once, so the view stays put while it draws)
  let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
  const acc = (x, y) => { minx = Math.min(minx, x); miny = Math.min(miny, y); maxx = Math.max(maxx, x); maxy = Math.max(maxy, y); };
  for (const s of shapes) accBounds(acc, s);
  if (!isFinite(minx)) return;
  const m = 16, sc = Math.min((cv.width - 2*m) / ((maxx - minx) || 1), (cv.height - 2*m) / ((maxy - miny) || 1));
  const T = (x, y) => [m + (x - minx) * sc, cv.height - m - (y - miny) * sc];
  const hueOf = (s, i) => (s.h !== undefined) ? s.h : 200 + (i / n) * 300;  // rainbow by index
  const drawOne = (s, i) => drawPrim(ctx, s, colorStr(hueOf(s, i), s.a), T, sc);
  if (!animate) { for (let k = 0; k < n; k++) drawOne(shapes[k], k); return; }
  let i = 0;
  const perFrame = Math.max(1, Math.ceil(n / 90));   // reveal the whole picture over ~90 frames
  function frame() {
    const end = Math.min(n, i + perFrame);
    for (; i < end; i++) drawOne(shapes[i], i);
    animId = (i < n) ? requestAnimationFrame(frame) : null;
  }
  frame();
}

// accumulate a shape's coordinates into a bounding-box accumulator (shared by drawShapes + viewOf)
function accBounds(acc, s) {
  if (s.kind === "Line") { acc(s.x1, s.y1); acc(s.x2, s.y2); }
  else if (s.kind === "Dot") acc(s.x, s.y);
  else if (s.kind === "Circle") { acc(s.x - s.r, s.y - s.r); acc(s.x + s.r, s.y + s.r); }
  else if (s.kind === "Rect") { acc(s.x, s.y); acc(s.x + s.w, s.y + s.h); }
  else if (s.kind === "Poly") for (const p of (s.pts || [])) acc(p.x, p.y);
}

// build a shape's colour string from its hue. "vivid" mode boosts saturation and, while
// animating, spins the whole palette through the rainbow over time.
let VIVID = false;
function colorStr(hue, alpha) {
  const a = (alpha === undefined) ? 1 : alpha;             // optional `a` field = opacity 0..1
  const shift = VIVID ? (performance.now() / 25) : 0;
  return `hsla(${(hue + shift) % 360}, ${VIVID ? 95 : 75}%, ${VIVID ? 60 : 62}%, ${a})`;
}

// the per-shape draw, shared by the static reveal (drawShapes) and the frame animation.
// Optional fields: `a` = opacity 0..1 (any shape), `fill` = fill Circle/Poly instead of
// stroke (soft blobs: glow, fog, confetti, balloons). Without them, shapes render as before.
function drawPrim(ctx, s, col, T, sc) {
  ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = 1.2;
  const filled = s.fill !== undefined;
  if (s.kind === "Line") { const [ax, ay] = T(s.x1, s.y1), [bx, by] = T(s.x2, s.y2);
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke(); }
  else if (s.kind === "Dot") { const [px, py] = T(s.x, s.y);
    ctx.beginPath(); ctx.arc(px, py, 2.3, 0, 7); ctx.fill(); }
  else if (s.kind === "Circle") { const [px, py] = T(s.x, s.y);
    ctx.beginPath(); ctx.arc(px, py, s.r * sc, 0, 7); if (filled) ctx.fill(); else ctx.stroke(); }
  else if (s.kind === "Rect") { const [px, py] = T(s.x, s.y + s.h);
    ctx.fillRect(px, py, s.w * sc, s.h * sc); }
  else if (s.kind === "Poly") { const pts = s.pts || [];
    if (pts.length) { ctx.beginPath(); const [x0, y0] = T(pts[0].x, pts[0].y); ctx.moveTo(x0, y0);
      for (let j = 1; j < pts.length; j++) { const [px, py] = T(pts[j].x, pts[j].y); ctx.lineTo(px, py); }
      if (filled) { ctx.closePath(); ctx.fill(); } else ctx.stroke(); } }
}

// a fixed view (transform) covering a set of shapes -- so an animation keeps a steady
// frame of reference instead of rescaling every tick.
function viewOf(shapes, cv) {
  let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
  const acc = (x, y) => { minx = Math.min(minx, x); miny = Math.min(miny, y); maxx = Math.max(maxx, x); maxy = Math.max(maxy, y); };
  for (const s of shapes) accBounds(acc, s);
  if (!isFinite(minx)) return null;
  const m = 16, sc = Math.min((cv.width - 2*m) / ((maxx - minx) || 1), (cv.height - 2*m) / ((maxy - miny) || 1));
  return { T: (x, y) => [m + (x - minx) * sc, cv.height - m - (y - miny) * sc], sc };
}

function paintShapes(ctx, shapes, view, cv) {
  ctx.fillStyle = "#0d1016"; ctx.fillRect(0, 0, cv.width, cv.height);
  const n = shapes.length;
  const hueOf = (s, i) => (s.h !== undefined) ? s.h : 200 + (i / n) * 300;
  for (let i = 0; i < n; i++)
    drawPrim(ctx, shapes[i], colorStr(hueOf(shapes[i], i), shapes[i].a), view.T, view.sc);
}

// frame animation: the program defines a pure frame(t) : Picture; the host advances t (in
// seconds). frame(t) is meant to be PERIODIC over t in [0, 2π] -- we sample one turn to fix
// the view, then repaint each tick. No mutable state: the picture is a pure function of time.
let frameOn = false, frameRAF = null;
function stopFrameAnim() { frameOn = false; if (frameRAF !== null) { cancelAnimationFrame(frameRAF); frameRAF = null; } }

async function animate() {
  if (!pyodide) return;
  stopAnim(); stopFrameAnim();
  const cv = $("canvas"); outEl.style.display = "none"; cv.style.display = "block";
  cv.width = cv.clientWidth; cv.height = cv.clientHeight;
  const ctx = cv.getContext("2d");
  ctx.fillStyle = "#0d1016"; ctx.fillRect(0, 0, cv.width, cv.height);
  pyodide.globals.set("_src", currentSource());
  let coords = [];
  for (let k = 0; k <= 16; k++) {                       // sample one turn to fix the view
    const t = (k / 16) * 2 * Math.PI;
    const r = JSON.parse(await pyodide.runPythonAsync("pz_frame(_src, " + t + ")"));
    if (r.error) { show("Animate needs a pure `frame(t)` returning a picture.\n\n" + r.error, "err"); return; }
    coords = coords.concat(r.shapes);
  }
  const view = viewOf(coords, cv);
  if (!view) { show("frame(t) produced nothing to draw.", "err"); return; }
  frameOn = true;
  const t0 = performance.now();
  let busy = false;
  async function loop() {
    if (!frameOn) return;
    if (!busy) {
      busy = true;
      const t = (performance.now() - t0) / 1000;        // seconds since start
      try {
        const r = JSON.parse(await pyodide.runPythonAsync("pz_frame(_src, " + t + ")"));
        if (frameOn && !r.error) paintShapes(ctx, r.shapes, view, cv);
      } catch (_) {}
      busy = false;
    }
    if (frameOn) frameRAF = requestAnimationFrame(loop);
  }
  loop();
}

// auto-save the editor to this browser so a reload keeps your work
const SAVE_KEY = "prism-playground-code";
let savedTimer = null;
function saveCode() {
  try { localStorage.setItem(SAVE_KEY, $("code").value); } catch (_) {}
  const el = $("saved"); if (!el) return;
  el.textContent = "✓ saved";
  clearTimeout(savedTimer); savedTimer = setTimeout(() => { el.textContent = ""; }, 1400);
}
function loadSaved() { try { return localStorage.getItem(SAVE_KEY); } catch (_) { return null; } }

// share via URL: the code is encoded into the page's #hash (UTF-8 safe base64), so a link
// like  playground.html#code=...  opens straight into that program. No server involved.
function encodeCode(s) { return btoa(unescape(encodeURIComponent(s))); }
function decodeCode(b) { try { return decodeURIComponent(escape(atob(b))); } catch (_) { return null; } }
function codeFromHash() {
  const m = /[#&]code=([^&]+)/.exec(location.hash || "");
  return m ? decodeCode(m[1]) : null;
}
function shareLink() {
  const url = location.origin + location.pathname + "#code=" + encodeCode($("code").value);
  const done = () => { const el = $("saved"); if (el) { el.textContent = "✓ link copied"; clearTimeout(savedTimer); savedTimer = setTimeout(() => { el.textContent = ""; }, 1800); } };
  history.replaceState(null, "", url);                 // also reflect it in the address bar
  if (navigator.clipboard) navigator.clipboard.writeText(url).then(done, done); else done();
}

// blank-slate starters, listed first so you can begin a fresh program
const STARTERS = {
  "✚ new — hello":   `main : () !console  <-\n  show!console "hello, Prism"\n`,
  "✚ new — drawing": `-- define picture (a list of shapes), then press Draw\npicture  <-\n  [ Line{x1: 0, y1: 0, x2: 120, y2: 90},\n    Dot{x: 120, y: 90},\n    Circle{x: 60, y: 45, r: 40} ]\n`,
  "✚ new — blank":   `-- start here\n`,
};

let allOptionNames = [];
let loadedName = null;                 // which option's source is actually IN the editor right now
// rebuild the dropdown to the names matching the filter. A leading placeholder is selected
// whenever the loaded item isn't in the list, so the box NEVER claims an item that isn't loaded
// (otherwise filtering could silently switch the shown item while the editor kept the old one).
function renderOptions(q) {
  const sel = $("examples"), ql = q.trim().toLowerCase();
  const names = allOptionNames.filter(n => n.toLowerCase().includes(ql));
  sel.innerHTML = "";
  const ph = document.createElement("option");
  ph.value = ""; ph.textContent = (q.trim() === "") ? "— pick a program —" : ("— " + names.length + " match —");
  sel.appendChild(ph);
  for (const n of names) { const o = document.createElement("option"); o.value = n; o.textContent = n; sel.appendChild(o); }
  sel.value = (loadedName && names.includes(loadedName)) ? loadedName : "";
}

function fillExamples() {
  const sel = $("examples");
  const galleryNames = addGalleryOptions();            // fills galleryPaths, returns the names
  allOptionNames = [...Object.keys(STARTERS), ...Object.keys(EXAMPLES), ...galleryNames];
  renderOptions("");
  $("search").addEventListener("input", () => renderOptions($("search").value));
  $("search").addEventListener("keydown", e => {        // Enter loads the first matching item
    if (e.key === "Enter") {
      const opt = [...sel.options].find(o => o.value);   // first real (non-placeholder) option
      if (opt) { sel.value = opt.value; sel.dispatchEvent(new Event("change")); }
    }
  });
  sel.addEventListener("change", async () => {
    const name = sel.value;
    if (!name) return;                                   // the placeholder -- nothing to load
    let src = STARTERS[name] ?? EXAMPLES[name];
    if (src === undefined && galleryPaths[name]) {       // lazy: fetch this one file on demand
      $("code").value = "-- loading " + name + " …";
      try {
        const r = await fetch(galleryPaths[name], { cache: "no-store" });
        src = EXAMPLES[name] = await r.text();
      } catch (e) { $("code").value = "-- could not load " + name + " (" + e + ")"; return; }
    }
    if (src !== undefined) { $("code").value = src; loadedName = name; refreshSliders(); updateRecommend(); saveCode(); }
  });
  // initial editor content: a shared #code= link > your last auto-saved code > the default example
  const shared = codeFromHash(), saved = loadSaved(), first = Object.keys(EXAMPLES)[0];
  if (shared != null && shared.trim() !== "")      { $("code").value = shared; loadedName = null; }
  else if (saved != null && saved.trim() !== "")   { $("code").value = saved;  loadedName = null; }
  else                                             { $("code").value = EXAMPLES[first]; loadedName = first; }
  renderOptions("");                                     // reflect what's actually loaded
}

// ---- live sliders: `slider(default, min, max)` in the source becomes a drag control ----
const SLIDER_RE = /slider\(\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*\)/g;
let sliderVals = [], sliderKey = "";
function refreshSliders() {
  const specs = [], src = $("code").value;
  let m; SLIDER_RE.lastIndex = 0;
  while ((m = SLIDER_RE.exec(src)) !== null) specs.push([+m[1], +m[2], +m[3]]);
  const key = specs.map(s => s.join(",")).join("|");
  if (key === sliderKey) return;                  // unchanged set -> keep the current values
  sliderKey = key;
  const panel = $("sliders"); panel.innerHTML = ""; sliderVals = [];
  if (!specs.length) { panel.className = ""; return; }
  panel.className = "on";
  specs.forEach(([def, lo, hi], idx) => {
    sliderVals.push(def);
    const wrap = document.createElement("label"); wrap.className = "sl";
    const lab = document.createElement("span"); lab.textContent = "p" + (idx + 1);
    const val = document.createElement("b"); val.textContent = (+def).toFixed(2);
    const inp = document.createElement("input");
    inp.type = "range"; inp.min = lo; inp.max = hi; inp.step = (hi - lo) / 240 || 0.01; inp.value = def;
    inp.addEventListener("input", () => {
      sliderVals[idx] = +inp.value; val.textContent = (+inp.value).toFixed(2); scheduleLiveDraw();
    });
    wrap.appendChild(lab); wrap.appendChild(inp); wrap.appendChild(val);
    panel.appendChild(wrap);
  });
}
// the source with each slider(...) replaced by its current value
function currentSource() {
  let i = 0;
  return $("code").value.replace(SLIDER_RE, () => String(sliderVals[i++]));
}
let liveBusy = false, livePending = false;
function scheduleLiveDraw() {
  if (!pyodide || !recommend($("code").value).includes("draw")) return;
  if (liveBusy) { livePending = true; return; }
  liveBusy = true;
  requestAnimationFrame(async () => {
    try {
      pyodide.globals.set("_src", currentSource());
      const data = JSON.parse(await pyodide.runPythonAsync("pz_picture(_src)"));
      if (data.shapes) drawShapes(data.shapes, false);   // instant (no reveal) for smooth dragging
    } catch (_) {}
    liveBusy = false;
    if (livePending) { livePending = false; scheduleLiveDraw(); }
  });
}

// recommend which action fits the current code: Draw (has `picture`), Run (has `main`),
// otherwise Check/Reveal. A definition starts at column 0, so anchor the regex to ^.
function recommend(code) {
  const r = [];
  if (/^frame\b/m.test(code))   r.push("anim");
  if (/^picture\b/m.test(code)) r.push("draw");
  if (/^main\b/m.test(code))    r.push("run");
  if (!r.length) r.push("check", "reveal");
  return r;
}

const BTN_LABEL = { run: "Run", check: "Check", reveal: "Reveal", draw: "Draw", anim: "Animate" };
function updateRecommend() {
  const r = recommend($("code").value);
  for (const id of ["run", "check", "reveal", "draw", "anim"]) $(id).classList.toggle("go", r.includes(id));
  $("hint").textContent = "→ " + r.map(i => BTN_LABEL[i]).join(" / ") + "  (Ctrl+Enter)";
}

const galleryPaths = {};
function addGalleryOptions() {                          // fills galleryPaths, returns the names
  const names = [];
  for (const path of GALLERY) {
    const parts = path.split("/");
    const leaf = parts[parts.length - 1].replace(".prism", "");
    const ja = LABELS[leaf];
    const name = ja ? ("★ " + ja + "（" + leaf + "）") : ("★ " + parts[0] + ": " + leaf);
    galleryPaths[name] = path; names.push(name);
  }
  return names;
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = src; s.crossOrigin = "anonymous";
    s.onload = resolve; s.onerror = () => reject(new Error("failed to load " + src));
    document.head.appendChild(s);
  });
}

async function loadEngine() {
  let indexURL = CDN_BASE, source = "CDN";
  try {                                   // prefer a local self-hosted Pyodide if present
    const r = await fetch("pyodide/pyodide.js", { method: "HEAD", cache: "no-store" });
    if (r.ok) { indexURL = "pyodide/"; source = "local"; }
  } catch (_) {}
  await loadScript(indexURL + "pyodide.js");
  const py = await loadPyodide({ indexURL });
  return { py, source };
}

function showLoading(msg) {
  stopAnim();
  $("canvas").style.display = "none"; outEl.style.display = "block"; outEl.className = "";
  outEl.innerHTML = `<div class="loading"><span class="spinner"></span><span>${msg}</span></div>`
    + `<p class="muted" style="margin-top:14px; line-height:1.6">First load fetches the Python `
    + `runtime (cached afterwards), so this takes a few seconds. Meanwhile you can browse the `
    + `examples and edit code — <b>Run / Check / Draw</b> light up when it's ready.</p>`;
}
async function fetchText(f) {
  const r = await fetch(f, { cache: "no-store" });
  if (!r.ok) throw new Error(`could not fetch ${f} (${r.status}) — run "prism serve"`);
  return { f, t: await r.text() };
}

async function boot() {
  fillExamples();
  showLoading("Downloading the Python runtime (Pyodide)…");
  try {
    // fetch the engine + library files in PARALLEL with Pyodide starting up
    const engineFiles = ["prism.py", "check.py", "lib/physics2d.prism", "lib/draw2d.prism", "lib/turtle.prism", "lib/math.prism", "lib/list.prism", "lib/picture.prism", "lib/lsystem.prism", "lib/escape.prism", "lib/plot.prism", "lib/chart.prism", "lib/ca.prism", "lib/digits.prism"];
    const filesP = Promise.all(engineFiles.map(fetchText));
    setStatus("downloading Python (Pyodide)…");
    const { py, source } = await loadEngine();
    pyodide = py;
    setStatus("starting the Prism engine…");
    showLoading("Starting the Prism engine…");
    const loaded = await filesP;
    try { pyodide.FS.mkdir("lib"); } catch (_) {}
    for (const { f, t } of loaded) pyodide.FS.writeFile(f, t, { encoding: "utf8" });
    await pyodide.runPythonAsync(GLUE);
    setStatus(`ready (Pyodide: ${source})`, "ok");
    ["run", "check", "reveal", "draw", "anim"].forEach(id => $(id).disabled = false);
    refreshSliders(); updateRecommend();
    show("Ready — pick an example, then Run / Check / Reveal / Draw.", "muted");
  } catch (e) {
    setStatus("failed", "err");
    show("Could not start the engine:\n" + e + "\n\nServe the folder first:  prism serve\nthen open  http://localhost:8000/playground.html", "err");
  }
}

async function call(pyFunc, withStdin) {
  if (!pyodide) return;
  show("…", "muted");
  try {
    pyodide.globals.set("_src", currentSource());
    if (withStdin) pyodide.globals.set("_stdin", $("stdin").value);
    const expr = withStdin ? `${pyFunc}(_src, _stdin)` : `${pyFunc}(_src)`;
    const result = await pyodide.runPythonAsync(expr);
    const cls = /\bFAIL\b|\[(prism|parse) error\]/.test(result) ? "err"
              : /\bOK\b|REVEAL/.test(result) ? "ok" : "";
    show(result, cls);
  } catch (e) {
    show("internal error:\n" + e, "err");
  }
}

$("run").addEventListener("click", () => call("pz_run", true));
$("check").addEventListener("click", () => call("pz_check", false));
$("reveal").addEventListener("click", () => call("pz_reveal", false));
let _recT;
$("code").addEventListener("input", () => { stopFrameAnim(); clearTimeout(_recT); _recT = setTimeout(() => { refreshSliders(); updateRecommend(); saveCode(); }, 250); });
$("code").addEventListener("keydown", (e) => {     // Ctrl/Cmd+Enter runs the recommended action
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
    e.preventDefault();
    const btn = $(recommend($("code").value)[0]);
    if (btn && !btn.disabled) btn.click();
  }
});
$("anim").addEventListener("click", animate);
$("share").addEventListener("click", shareLink);
$("vivid").addEventListener("change", () => {       // re-render a still picture so the change shows at once
  VIVID = $("vivid").checked;
  if (!frameOn && $("canvas").style.display !== "none" && recommend($("code").value).includes("draw")) $("draw").click();
});
$("draw").addEventListener("click", async () => {
  if (!pyodide) return;
  show("drawing…", "muted");
  try {
    pyodide.globals.set("_src", currentSource());
    const data = JSON.parse(await pyodide.runPythonAsync("pz_picture(_src)"));
    if (data.error) { show("Draw needs a `picture` value (a list of shapes).\n\n" + data.error, "err"); return; }
    drawShapes(data.shapes, true);
  } catch (e) { show("draw error:\n" + e, "err"); }
});
boot();
